<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/IMG_6935.png" />
    <link rel="apple-touch-icon" href="/IMG_6935.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Cortex</title>

    <!-- PWA Meta Tags -->
    <meta name="description" content="A clean AI chat experience powered by Claude models" />
    <meta name="theme-color" content="#FAFAF7" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Cortex" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Fonts: Fraunces (serif), Inter (sans), JetBrains Mono (mono) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Open Graph / Social -->
    <meta property="og:title" content="Cortex" />
    <meta property="og:description" content="A clean AI chat experience powered by Claude models" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/IMG_6935.png" />

    <script>
      // Resolve theme before paint to avoid a flash of the wrong palette.
      (function () {
        try {
          var stored = localStorage.getItem('cortex-theme')
          var mode = stored === 'light' || stored === 'dark' || stored === 'system' ? stored : 'system'
          var resolved =
            mode === 'system'
              ? window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
              : mode
          document.documentElement.dataset.theme = resolved
          var meta = document.querySelector('meta[name="theme-color"]')
          if (meta) meta.setAttribute('content', resolved === 'dark' ? '#15110e' : '#FAFAF7')
        } catch (e) {}
      })()
    </script>
    <style>
      /* Initial loader - shown until React mounts */
      body {
        margin: 0;
        background: #fafaf7;
      }
      html[data-theme='dark'] body {
        background: #15110e;
      }
      .initial-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: #fafaf7;
        color: #b8542c;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      html[data-theme='dark'] .initial-loader {
        background: #15110e;
      }
      .initial-loader h1 {
        font-size: 2rem;
        font-weight: 400;
        margin-bottom: 2rem;
      }
      .loader-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #e8e2d7;
        border-top-color: #b8542c;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      html[data-theme='dark'] .loader-spinner {
        border-color: #2a221c;
        border-top-color: #d97049;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Loader removed — React mounts fast enough that a blank flash is negligible.
           If needed in the future, add a minimal spinner here (not the full splash). -->
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
